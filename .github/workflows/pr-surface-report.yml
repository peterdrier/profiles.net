name: PR Surface Report

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-surface-report-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  report:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Fetch PR head
        run: |
          set -euo pipefail
          git fetch --no-tags origin "pull/${{ github.event.pull_request.number }}/head:pr-surface-head"

      - name: Generate surface report
        run: |
          python3 scripts/pr-surface-report.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "pr-surface-head" \
            --base-label "${{ github.event.pull_request.base.sha }}" \
            --head-label "${{ github.event.pull_request.head.sha }}" \
            --output pr-surface-report.md \
            --json-output pr-surface-report.json

      - name: Post or update PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- pr-surface-report -->';
            const body = fs.readFileSync('pr-surface-report.md', 'utf8');
            const {owner, repo} = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Enforce migration count
        if: always()
        run: |
          count="$(jq -r '.migration_count' pr-surface-report.json)"
          if [ "$count" -gt 1 ]; then
            echo "::error::PR changes $count real EF migration files. Keep at most 1 migration per PR."
            exit 1
          fi
