name: claude-review

# Auto-review PRs using the official Anthropic claude-code-action.
# CLAUDE_CODE_OAUTH_TOKEN (from `claude setup-token` against a Pro/Max
# subscription) bills review runs against the subscription rather than
# the API. Posts inline comments + a top-level summary, like Codex.
#
# This file is identical in peterdrier/Humans and nobodies-collective/Humans;
# behavior diverges via the `if:` guard below so the file promotes cleanly
# between the two repos:
#
#   peterdrier/Humans
#     Trigger: pull_request for same-repo PRs (collaborator pushed branch
#              directly to peterdrier/Humans), pull_request_target for
#              fork PRs from trusted authors (OWNER/MEMBER/COLLABORATOR
#              per GitHub's author_association). Random external forks
#              are skipped — pull_request_target with a checkout of
#              attacker-controlled code would be a "pwn-request" hole.
#     Auth:    OIDC → claude[bot] App token on pull_request (default);
#              workflow GITHUB_TOKEN on pull_request_target (see #713
#              below).
#
#   nobodies-collective/Humans
#     Trigger: pull_request_target, only when the head is peterdrier/Humans
#              (the QA-promotion path). Random external forks are skipped —
#              same pwn-request reason.
#     Auth:    Workflow GITHUB_TOKEN. Anthropic's OIDC → App-token exchange
#              currently 401s on pull_request_target events
#              (anthropics/claude-code-action#713); passing github_token
#              tells the action to skip OIDC and post as github-actions[bot].
#     Checkout: base ref (default), per the action's docs/security.md —
#               do NOT check out the PR head into the workspace root.
#
# Run cadence:
#   Auto: ONCE on PR open (non-draft) and ONCE on draft → ready_for_review.
#         We deliberately do NOT listen to 'synchronize' — review every push
#         burns budget. Re-reviews are on-demand via `/review` comment, or
#         by toggling draft → ready.
#   On-demand: any OWNER/MEMBER/COLLABORATOR posting a comment starting with
#              `/review` on the PR triggers a fresh run. The docs-only skip
#              does NOT apply to comment-triggered runs (explicit ask wins).
#
# Concurrency: per-PR group with cancel-in-progress. A new push or `/review`
# during an in-flight review cancels the stale run instead of stacking.
#
# Why pull_request_target stays safe: the pwn-request hole only opens if
# you `actions/checkout` the PR head and execute code from it (build,
# test, install). This workflow checks out the BASE ref (default for
# pull_request_target) and reads the PR diff via the GitHub API through
# the action — fork code never runs locally. Do NOT add build/test steps
# to this job.
#
# Setup (one-time, per repo):
#   1. `claude setup-token` locally → copy the OAuth token.
#   2. Add as repo secret CLAUDE_CODE_OAUTH_TOKEN
#      (Settings → Secrets and variables → Actions).
#   3. Token is valid ~1 year; rotate by re-running setup-token.

on:
  pull_request:
    types: [opened, ready_for_review]
  pull_request_target:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]
  # Note: do NOT use trigger-level paths-ignore here. For pull_request /
  # pull_request_target, GitHub evaluates path filters against the PR's
  # cumulative diff vs base, not the push delta — so once any code is in
  # the PR, every later docs-only push still triggers the workflow. The
  # docs-only-push skip is enforced by the `skip-if-docs-only` step
  # below, which checks the actual push delta via the compare API.

concurrency:
  group: claude-review-${{ github.repository }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    if: |
      (github.event_name == 'issue_comment'
        && github.event.issue.pull_request != null
        && startsWith(github.event.comment.body, '/review')
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
                    github.event.comment.author_association))
      ||
      (github.event.pull_request.draft == false && (
        (github.event_name == 'pull_request'
          && github.repository == 'peterdrier/Humans'
          && github.event.pull_request.head.repo.full_name == github.repository)
        ||
        (github.event_name == 'pull_request_target'
          && github.repository == 'peterdrier/Humans'
          && github.event.pull_request.head.repo.full_name != github.repository
          && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
                      github.event.pull_request.author_association))
        ||
        (github.event_name == 'pull_request_target'
          && github.repository == 'nobodies-collective/Humans'
          && github.event.pull_request.head.repo.full_name == 'peterdrier/Humans')
      ))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Skip the review when this event's push delta is docs-only.
      # Compares github.event.before...github.event.after via the compare
      # API (works across forks because PR head SHAs are mirrored into
      # refs/pull/N/head in the base repo). On 'opened' / 'ready_for_review',
      # before is absent or all-zeros — fall back to base.sha → head.sha,
      # which is the full PR diff and correctly catches all-docs-from-open.
      # Fails open: if the compare endpoint errors, run the review.
      - name: skip-if-docs-only
        id: guard
        if: github.event_name != 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.event.after }}'
          if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            BEFORE='${{ github.event.pull_request.base.sha }}'
          fi
          if [[ -z "$AFTER" ]]; then
            AFTER='${{ github.event.pull_request.head.sha }}'
          fi
          echo "Comparing $BEFORE...$AFTER"
          if ! files=$(gh api "repos/${{ github.repository }}/compare/${BEFORE}...${AFTER}" --jq '.files[].filename' 2>&1); then
            echo "Compare API failed; running review anyway."
            echo "$files"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ -z "$files" ]]; then
            echo "No file changes in this delta; skipping review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Changed files in delta:"
          echo "$files"
          if echo "$files" | grep -qvE '(^docs/|\.md$)'; then
            echo "Non-docs files present; running review."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "Docs-only delta; skipping review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.guard.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # On pull_request_target, skip OIDC (see #713 above) by handing the
          # action the workflow token directly. Empty on pull_request → action
          # falls back to OIDC and posts as claude[bot].
          github_token: ${{ github.event_name == 'pull_request_target' && secrets.GITHUB_TOKEN || '' }}
          show_full_output: true
          prompt: |
            Review this pull request for the Nobodies Humans codebase.

            Anchor your review on the project's own rule documents (read them
            from the checkout):
              - CLAUDE.md
              - memory/INDEX.md (atomic project rules; fetch ONLY the
                atoms whose description matches the change under review —
                do not read the whole atom set)
              - docs/architecture/code-review-rules.md
              - docs/architecture/design-rules.md

            Do NOT read docs/sections/ or docs/features/ as part of this
            review. Section invariants and feature specs are reviewed
            separately by /section-align on demand; including them here
            burns budget and produces cross-document nits this workflow
            should not gate on.

            Cover correctness, security, and the project's design/coding
            rules (services own their data, no cross-service DB access,
            NodaTime, append-only ConsentRecord, no concurrency tokens,
            etc.). Do not flag stylistic nits. Do not flag doc-only
            concerns (typos in markdown, missing doc cross-links, etc.) —
            those are out of scope for this reviewer.

            ## Budget

            Aim for ≤30 turns of analysis before you start posting
            findings. If you reach 60 turns of analysis still not having
            posted anything, STOP analyzing, post the findings you have,
            and include in the summary `WARN — review was budget-truncated,
            partial coverage only.` The hard `--max-turns 100` ceiling is
            a crash backstop, not a target — never spend it all on
            analysis.

            ## Severity floor

            Post only P0 (BLOCK — bug, security, rule violation), P1
            (WARN — likely-wrong or risky), and P2 (WARN — concrete fix
            suggested, ≥80% confidence) findings. P3 stylistic nits,
            preference-level commentary, and "consider also..." asides
            are forbidden. No upper cap on count — if you find 12 valid
            P0/P1/P2 findings, post all 12.

            Prefix bodies with `BLOCK —` for P0 and `WARN —` for P1/P2,
            then the rule reference, what's wrong, and the fix.

            ## Existing thread state — fetch BEFORE deciding what to flag

            Synchronize fires on every push. To avoid re-flagging the same
            finding across pushes, fetch the existing review threads FIRST
            and build a deny-list. Then run your review pass. Then filter
            findings against the deny-list before posting.

            Use GraphQL — the REST `/pulls/{N}/comments` endpoint does NOT
            expose `isResolved`, so it cannot tell you which threads have
            been resolved via the GitHub UI:

              gh api graphql \
                -F owner='${{ github.event.repository.owner.login }}' \
                -F repo='${{ github.event.repository.name }}' \
                -F pr=${{ github.event.pull_request.number || github.event.issue.number }} \
                -f query='
                  query($owner: String!, $repo: String!, $pr: Int!) {
                    repository(owner: $owner, name: $repo) {
                      pullRequest(number: $pr) {
                        reviewThreads(first: 100) {
                          nodes {
                            isResolved
                            isOutdated
                            path
                            line
                            comments(first: 50) {
                              nodes { author { login } body }
                            }
                          }
                        }
                      }
                    }
                  }
                '

            For each thread node in the response, classify as
            **suppressed** if EITHER:

            - **Resolved** (`isResolved == true` — the GitHub UI "Resolve
              conversation" button was clicked).
            - **Declined / not-doing**: any reply in the thread's `comments`
              chain contains "not doing", "declined", "out of scope",
              "won't fix", "wontfix", "leaving as-is", "leaving as is",
              "Peter authorized", "by design", "intentional", "no change",
              "skip", or similar accepted-as-is language. The deviation
              is sanctioned.

            Include OUTDATED threads (`isOutdated == true`) in the
            deny-list — across pushes, line numbers shift and GitHub
            marks the original thread outdated, but the underlying issue
            is the same. Do not re-flag.

            For each suppressed thread, extract a **finding identity**
            and match a new finding against the deny-list using ALL of:

            1. **Rule reference** — the atom path (e.g.
               `memory/code/...`), doc anchor, or rule citation quoted in
               the suppressed thread's first comment. The new finding
               cites the same rule.
            2. **Finding category** — what's wrong in plain terms
               (e.g. "cross-service DB write", "missing authorization
               handler", "EF type leaking into Application layer"). The
               new finding describes the same category.
            3. **Site identity** — at least ONE of:
               - same file path, OR
               - same symbol / method / type / endpoint name quoted in
                 the bodies (handles refactors that move the same
                 violation to a sibling file), OR
               - the suppressed thread's offending code snippet
                 substantially overlaps the new finding's code snippet.

            Suppress the new finding ONLY if (1) AND (2) AND (3) all
            match. Same rule + same category on a DIFFERENT site is a
            legitimately new finding — post it. Two distinct violations
            of the same rule on the same PR are both valid, even if one
            was declined.

            ## How to post the review (STRICT)

            Do ALL of your analysis before posting anything. Do every
            review pass — atom rules, code-review-rules, design-rules —
            entirely in your head / scratch reasoning, NOT as posted
            comments. (Section invariants and feature specs are out of
            scope per the reading-list block above; do not include them
            in the analysis pass.)

            Findings post in TWO channels:

            1. **Inline review comments** (the default — use this for
               anything tied to a specific file + line). Post each
               finding via
               `mcp__github_inline_comment__create_inline_comment` with
               `confirmed: true` so the comment posts immediately rather
               than buffering. These create review threads that carry
               GitHub's `isResolved` flag, which downstream tooling and
               reviewers rely on to track which findings have been
               addressed.

               Body format: start with `BLOCK — <one-line title>` or
               `WARN — <one-line title>`, then the rule reference
               (atom path or doc anchor), then what's wrong, then the
               suggested fix. Use a ```suggestion``` block when the fix
               is a drop-in line replacement. One inline comment per
               finding — do NOT batch multiple findings into one comment.

            2. **Top-level summary** via `gh pr comment`. Posted EXACTLY
               ONCE per run, AFTER all inline comments. Posting more
               than one top-level summary comment is forbidden — no
               "interim" summaries, no "round 1 / round 2", no extra
               comments after the final one.

            ## What the summary comment must say (and must NOT say)

            The summary MUST reference the head commit SHA. Three formats:

            - No findings: post EXACTLY
              `Reviewed commit <sha> — no issues found.`
              and nothing else. Do not list what was checked, do not list
              "Clean" areas, do not enumerate rules that passed.

            - Inline findings only (the typical case): post EXACTLY
              `Reviewed commit <sha>. <N> inline finding(s) posted.`
              where N is the count of inline comments you posted. Do NOT
              re-list the inline findings in the summary — inline is the
              source of truth.

            - Cross-cutting findings (architecture, missing files,
              repo-wide concerns that don't attach to one line): include
              them in the summary AFTER the count line, prefixed
              `BLOCK —` / `WARN —` with the same rule-ref / what's wrong
              / fix structure as inline. Use this channel sparingly —
              prefer attaching findings to a representative line when
              one exists.

            Rationale: a reviewer wants to know what's broken, where, and
            be able to mark each finding "resolved" once fixed. Inline
            threads support that workflow; a wall of findings in a
            top-level comment doesn't, because top-level comments have no
            `isResolved` flag. Listing clean areas is noise that buries
            real findings.
          claude_args: |
            --max-turns 100
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*),Bash(gh api:*)"
