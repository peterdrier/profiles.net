name: Claude PR Review

# Auto-review PRs using the official Anthropic claude-code-action.
# CLAUDE_CODE_OAUTH_TOKEN (from `claude setup-token` against a Pro/Max
# subscription) bills review runs against the subscription rather than
# the API. Posts inline comments + a top-level summary, like Codex.
#
# This file is identical in peterdrier/Humans and nobodies-collective/Humans;
# behavior diverges via the `if:` guard below so the file promotes cleanly
# between the two repos:
#
#   peterdrier/Humans
#     Trigger: pull_request for same-repo PRs (collaborator pushed branch
#              directly to peterdrier/Humans), pull_request_target for
#              fork PRs from trusted authors (OWNER/MEMBER/COLLABORATOR
#              per GitHub's author_association). Random external forks
#              are skipped — pull_request_target with a checkout of
#              attacker-controlled code would be a "pwn-request" hole.
#     Auth:    OIDC → claude[bot] App token on pull_request (default);
#              workflow GITHUB_TOKEN on pull_request_target (see #713
#              below).
#
#   nobodies-collective/Humans
#     Trigger: pull_request_target, only when the head is peterdrier/Humans
#              (the QA-promotion path). Random external forks are skipped —
#              same pwn-request reason.
#     Auth:    Workflow GITHUB_TOKEN. Anthropic's OIDC → App-token exchange
#              currently 401s on pull_request_target events
#              (anthropics/claude-code-action#713); passing github_token
#              tells the action to skip OIDC and post as github-actions[bot].
#     Checkout: base ref (default), per the action's docs/security.md —
#               do NOT check out the PR head into the workspace root.
#
# Why pull_request_target stays safe: the pwn-request hole only opens if
# you `actions/checkout` the PR head and execute code from it (build,
# test, install). This workflow checks out the BASE ref (default for
# pull_request_target) and reads the PR diff via the GitHub API through
# the action — fork code never runs locally. Do NOT add build/test steps
# to this job.
#
# Setup (one-time, per repo):
#   1. `claude setup-token` locally → copy the OAuth token.
#   2. Add as repo secret CLAUDE_CODE_OAUTH_TOKEN
#      (Settings → Secrets and variables → Actions).
#   3. Token is valid ~1 year; rotate by re-running setup-token.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  pull_request_target:
    types: [opened, synchronize, ready_for_review]

jobs:
  review:
    if: |
      github.event.pull_request.draft == false && (
        (github.event_name == 'pull_request'
          && github.repository == 'peterdrier/Humans'
          && github.event.pull_request.head.repo.full_name == github.repository)
        ||
        (github.event_name == 'pull_request_target'
          && github.repository == 'peterdrier/Humans'
          && github.event.pull_request.head.repo.full_name != github.repository
          && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
                      github.event.pull_request.author_association))
        ||
        (github.event_name == 'pull_request_target'
          && github.repository == 'nobodies-collective/Humans'
          && github.event.pull_request.head.repo.full_name == 'peterdrier/Humans')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # On pull_request_target, skip OIDC (see #713 above) by handing the
          # action the workflow token directly. Empty on pull_request → action
          # falls back to OIDC and posts as claude[bot].
          github_token: ${{ github.event_name == 'pull_request_target' && secrets.GITHUB_TOKEN || '' }}
          prompt: |
            Review this pull request for the Nobodies Humans codebase.

            Anchor your review on the project's own rule documents (read them
            from the checkout):
              - CLAUDE.md
              - memory/INDEX.md (atomic project rules; fetch atoms whose
                description matches the change under review)
              - docs/architecture/code-review-rules.md
              - docs/architecture/design-rules.md

            For any section the PR touches, also consult the matching
            invariant doc under docs/sections/ and the feature spec under
            docs/features/.

            Cover correctness, security, the project's design/coding rules
            (services own their data, no cross-service DB access, NodaTime,
            append-only ConsentRecord, no concurrency tokens, etc.), and
            adherence to documented invariants. Do not flag stylistic nits.

            ## How to post the review (STRICT)

            Do ALL of your analysis before calling `gh pr comment`. Do every
            review pass — atom rules, code-review-rules, design-rules,
            section invariants, feature spec — entirely in your head /
            scratch reasoning, NOT as separate posted comments. Inline
            comments via the inline-comment MCP tool are fine while you
            work; top-level summary comments are NOT.

            When (and only when) every pass is complete, call `gh pr comment`
            EXACTLY ONCE with the final consolidated summary. Posting more
            than one top-level summary comment per run is forbidden. No
            "interim" summaries, no "round 1 / round 2" posts, no extra
            comments after the final one. One run → one terminal summary
            comment.

            ## What the summary comment must say (and must NOT say)

            The comment MUST reference the head commit SHA. Two formats:

            - Clean run (no findings): post EXACTLY this, nothing else —
              `Reviewed commit <sha> — no issues found.`
              Do not list what was checked, do not list "Clean" areas, do
              not enumerate rules that passed, do not add a checklist of
              things that looked fine. If there are no findings, the
              one-line "no issues found" message is the entire comment.

            - With findings: start with `Reviewed commit <sha>.` then list
              ONLY the findings (BLOCK / WARN, file refs, what's wrong,
              suggested fix). Do NOT include a "Clean" section, a "What I
              checked" section, a list of rules that passed, or any
              reassurance about areas without issues. Findings only.

            Rationale: a reviewer wants to know what's broken, nothing
            else. Listing clean areas is noise that buries real findings
            and wastes the reader's time.
          claude_args: |
            --max-turns 100
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*)"
